name: Test Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # ── LEVEL 1: Unit Tests (every commit) ──
  level-1-unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --dev
      - name: Run unit tests with coverage
        run: |
          uv run pytest tests/unit/ -v -m "not container and not staging" \
            --cov=src --cov-report=term-missing --cov-fail-under=80
      - name: Run critical tests (C1-C7)
        run: uv run pytest -v -m critical --tb=short

  # ── LEVEL 1: IaC Validation (every commit) ──
  level-1-iac:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --dev
      - name: Python IaC tests
        run: uv run pytest tests/unit/infra/ -v
      - name: IAM wildcard audit
        run: |
          ! grep -r 'Resource.*"\*"' infrastructure/ --include="*.yaml" --include="*.tf" || \
          { echo "FAIL: IAM wildcard found"; exit 1; }
      - name: detect-secrets scan
        run: |
          pip install detect-secrets
          detect-secrets scan --baseline .secrets.baseline
          detect-secrets audit .secrets.baseline --report

  # ── LEVEL 2: Container (PRs only) ──
  level-2-container:
    needs: [level-1-unit, level-1-iac]
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t conversational-agent:test .
      - name: Start container
        run: |
          docker run -d --name agent -p 8080:8080 \
            -e SUPERVISOR_AGENT_MODEL_ID=mock \
            -e AGENTCORE_MEMORY_ID=mock \
            conversational-agent:test
          sleep 10
      - name: Health check
        run: bash tests/container/test_health.sh
      - name: Cleanup
        if: always()
        run: docker stop agent && docker rm agent

  # ── LEVEL 3: Staging (merge to main only) ──
  level-3-staging:
    needs: [level-1-unit, level-1-iac]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.STAGING_ROLE_ARN }}
          aws-region: us-east-1
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --dev
      - name: Deploy staging
        working-directory: infrastructure/terraform
        run: |
          terraform init
          terraform apply -auto-approve -var="environment=staging"
      - name: Run e2e tests
        run: |
          uv run pytest tests/e2e/ -v -m staging \
            --staging-url=${{ secrets.STAGING_URL }}
      - name: Destroy staging
        if: always()
        working-directory: infrastructure/terraform
        run: terraform destroy -auto-approve -var="environment=staging"
