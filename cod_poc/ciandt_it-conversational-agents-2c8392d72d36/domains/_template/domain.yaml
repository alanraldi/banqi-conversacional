# ============================================================
# Domain Configuration Template
# ============================================================
# Copy this directory and edit for your domain:
#   cp -r domains/_template domains/your-domain-slug
#
# Then set the env var before running:
#   export DOMAIN_DIR=domains/your-domain-slug
# ============================================================

domain:
  name: "YourDomain"                    # Display name (e.g., "BrewShop")
  slug: "your-domain-slug"              # AWS resource names — lowercase, hyphens only
  description: "Description of your conversational agent"
  language_default: "pt-BR"

agent:
  name: "your_multi_agent"              # AgentCore runtime name — alphanumeric + underscore
  memory_name: "YourDomainMemory"
  session_prefix: "session"

supervisor:
  prompt_file: "prompts/supervisor.md"  # Relative to this domain directory
  description: "Coordenador principal que analisa intenção e roteia para agentes especializados"
  model_id_env: "SUPERVISOR_AGENT_MODEL_ID"

sub_agents:
  services:
    name: "Services Agent"
    description: "Operações do domínio"                     # ← EDIT: describe your operations
    prompt_file: "prompts/services.md"
    tool_docstring: "Processa operações do domínio"         # ← EDIT: what this agent does
    model_id_env: "SERVICES_AGENT_MODEL_ID"
    tools_source: "gateway_mcp"         # gateway_mcp | bedrock_kb | none
  knowledge:
    name: "Knowledge Agent"
    description: "Informações sobre produtos e serviços"
    prompt_file: "prompts/knowledge.md"
    tool_docstring: "Consultas gerais sobre produtos e serviços"
    model_id_env: "KNOWLEDGE_AGENT_MODEL_ID"
    tools_source: "bedrock_kb"

memory:
  namespaces:
    users/{user_id}/preferences:
      top_k: 3
      relevance_score: 0.7
    users/{user_id}/facts:
      top_k: 7
      relevance_score: 0.4
    summaries/{user_id}/{session_id}:
      top_k: 3
      relevance_score: 0.4

channels:
  whatsapp:
    enabled: true
    type: webhook
  chainlit:
    enabled: true
    type: local

interface:
  welcome_message: |
    👋 Olá! Sou o assistente YourDomain.
    Como posso te ajudar?
  author_name: "YourDomain Assistant"

error_messages:
  generic: "Desculpe, ocorreu um erro. Tente novamente em alguns instantes."
  empty_input: "Envie sua pergunta ou solicitação."
