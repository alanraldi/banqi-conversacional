services:

  # -------------------------------------------------------------------
  # Mock das APIs banQi (já existente em mock_api/)
  # -------------------------------------------------------------------
  mock-api:
    build:
      context: .
      dockerfile: mock_api/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 3

  # -------------------------------------------------------------------
  # DynamoDB Local — substitui DynamoDB da AWS
  # -------------------------------------------------------------------
  dynamodb:
    image: amazon/dynamodb-local:2.5.2
    ports:
      - "8001:8000"
    command: ["-jar", "DynamoDBLocal.jar", "-sharedDb", "-inMemory"]
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/shell/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

  # -------------------------------------------------------------------
  # Setup das tabelas DynamoDB Local (roda uma vez e sai)
  # -------------------------------------------------------------------
  dynamodb-setup:
    image: amazon/aws-cli:2.15.0
    depends_on:
      dynamodb:
        condition: service_healthy
    environment:
      - AWS_ACCESS_KEY_ID=local
      - AWS_SECRET_ACCESS_KEY=local
      - AWS_DEFAULT_REGION=us-east-1
    entrypoint: >
      /bin/sh -c "
        aws dynamodb create-table
          --table-name banqi-dedup
          --attribute-definitions AttributeName=message_id,AttributeType=S
          --key-schema AttributeName=message_id,KeyType=HASH
          --billing-mode PAY_PER_REQUEST
          --endpoint-url http://dynamodb:8000 &&
        aws dynamodb create-table
          --table-name banqi-sessions
          --attribute-definitions AttributeName=phone,AttributeType=S
          --key-schema AttributeName=phone,KeyType=HASH
          --billing-mode PAY_PER_REQUEST
          --endpoint-url http://dynamodb:8000 &&
        echo 'Tabelas criadas com sucesso'
      "

  # -------------------------------------------------------------------
  # Agente local — roda src/main.py como servidor HTTP
  # Único componente que chama AWS real (Bedrock)
  # -------------------------------------------------------------------
  agent:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - APP_ENV=dev
      - BANQI_API_BASE_URL=http://mock-api:8000
      - DEDUP_TABLE_NAME=banqi-dedup
      - SESSION_TABLE_NAME=banqi-sessions
      - AWS_ENDPOINT_URL_DYNAMODB=http://dynamodb:8001
      - AGENTCORE_MEMORY_ID=      # vazio = modo sem memória
      - AGENTCORE_GATEWAY_ENDPOINT= # vazio = sem MCP, usa mock direto
    depends_on:
      mock-api:
        condition: service_healthy
      dynamodb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/ping')"]
      interval: 15s
      timeout: 5s
      retries: 5
